name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: schoolmule-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: schoolmule-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit:coverage

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: schoolmule-backend/coverage/unit/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: schoolmule-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: schoolmule_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d schoolmule_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      PG_HOST: localhost
      PG_PORT: 5433
      PG_USER: test_user
      PG_PASSWORD: test_password
      PG_DATABASE: schoolmule_test
      JWT_SECRET: test-jwt-secret-key-for-integration-tests
      RESEND_API_KEY: test_resend_key
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:4000
      CROSS_ORIGIN_URL: http://localhost:3000
      SUPABASE_URL: https://mock.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: mock-service-role-key
      SUPPORT_EMAIL: test@test.com
      MAIL_DOMAIN: test.com
      ALHAADIACADEMY_RESEND_API_KEY: test_key

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: schoolmule-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration:coverage

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: schoolmule-backend/coverage/integration/
